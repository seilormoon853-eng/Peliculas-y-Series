  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background: radial-gradient(circle, #101820, #050608);
      overflow:hidden;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    /* CONTENEDOR GENERAL */
    .contenedor{
      position:relative;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      perspective:1500px;
    }

    /* IMAGEN CENTRAL */
    .centro{
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      overflow:hidden;
      z-index:10;
      box-shadow:0 0 40px rgba(255,255,255,0.5);
    }

    .centro img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* CARRUSEL */
    .carrusel{
      position:relative;
      width:700px;
      height:700px;
      transform-style:preserve-3d;
      animation:girar 30s linear infinite;
    }

    @keyframes girar{
      from{
        transform:rotateY(0deg);
      }
      to{
        transform:rotateY(360deg);
      }
    }

    /* TARJETAS */
    .card{
      position:absolute;
      width:140px;
      height:200px;
      left:50%;
      top:50%;
      transform-style:preserve-3d;
      transition:0.4s;
    }

    .card a{
      text-decoration:none;
      color:white;
    }

    .contenido{
      background:#1b1f27;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.5);
      transition:0.4s;
    }

    .contenido:hover{
      transform:scale(1.2);
      box-shadow:0 0 25px #00ffff;
    }

    .contenido img{
      width:100%;
      height:140px;
      object-fit:cover;
      display:block;
    }

    .info{
      padding:10px;
      text-align:center;
    }

    .info h3{
      font-size:16px;
      margin-bottom:5px;
    }

    .info p{
      font-size:12px;
      color:#ccc;
    }

.contenedor-boton{
    position: fixed;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
}

.btn-encuesta{
    display: inline-block;
    padding: 15px 30px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-encuesta:hover{
    background: #2563eb;
}

  </style>
</head>
